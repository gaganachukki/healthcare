<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Stackly Healthcare</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/contact.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>



    <!-- Login Container -->
    <div class="auth-container">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        
        <div class="glass-card auth-card reveal">

            <a href="index.html" style="display: inline-block; margin-bottom: 10px;">
                <img src="assets/logo.webp" alt="Stackly Logo" style="height: 50px; width: auto; object-fit: contain;">
            </a>
            <p style="font-size: 1.1rem; color: #a0a5b1; margin-bottom: 30px;">Sign in to access your account</p>
            
            <div class="role-toggle">
                <div class="role-btn active" onclick="document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active')); this.classList.add('active');">
                    <i class="ri-user-line"></i>
                    <span>Patient</span>
                </div>
                <div class="role-btn" onclick="document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active')); this.classList.add('active');">
                    <i class="ri-shield-user-line"></i>
                    <span>CEO/Doctors</span>
                </div>
            </div>

            <form id="loginForm" class="auth-form" onsubmit="event.preventDefault(); window.location.href='userdashboard.html';">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="Email Address" required oninvalid="this.setCustomValidity('Please fill in this field.')" oninput="this.setCustomValidity('')">
                </div>
                <div class="form-group">
                    <div class="label-row">
                        <label for="loginPassword">Password</label>
                        <a href="404.html" class="forgot-link">Forgot Password?</a>
                    </div>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" class="form-control" placeholder="Password" required>
                        <i class="ri-eye-line toggle-password" onclick="const p=document.getElementById('loginPassword'); p.type=p.type==='password'?'text':'password'; this.classList.toggle('ri-eye-off-line');"></i>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-group">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember Me</span>
                    </label>
                </div>
                
                <button type="submit" class="btn-login" style="width: 100%; margin-top: 10px;">Login</button>
                
                <div class="auth-links" style="text-align: center;">
                    Don't have an account? <a href="register.html" class="signup-link">Sign Up</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/animation.js"></script>
    <script src="js/validation.js"></script>
</body>
</html>
