<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Stackly Healthcare</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/contact.css">
    <link rel="stylesheet" href="css/login.css">
    <style>
        .auth-card.register-card {
            max-width: 700px;
        }
        .form-row {
            display: flex;
            gap: 20px;
        }
        .form-row .form-group {
            flex: 1;
        }
        .register-success {
            display: none;
            background: rgba(0, 240, 255, 0.1);
            color: var(--cyan-glow);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            border: 1px solid var(--cyan-glow);
        }
        @media (max-width: 600px) {
            .form-row {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>
<body>



    <!-- Register Container -->
    <div class="auth-container">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        
        <div class="glass-card auth-card register-card reveal">
            <i class="ri-user-add-line" style="font-size: 3rem; color: var(--cyan-glow); margin-bottom: 10px; display: inline-block;"></i>
            <h2>Create Account</h2>
            <p>Join us to access personalized healthcare services</p>
            
            <form id="registerForm" class="auth-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="regName">Full Name</label>
                        <i class="ri-user-line"></i>
                        <input type="text" id="regName" class="form-control with-icon" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email Address</label>
                        <i class="ri-mail-line"></i>
                        <input type="email" id="regEmail" class="form-control with-icon" placeholder="john@example.com" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="regPhone">Phone Number</label>
                        <i class="ri-phone-line"></i>
                        <input type="tel" id="regPhone" class="form-control with-icon" placeholder="Numbers only" pattern="[0-9]{10,14}" title="Please enter a valid phone number (digits only)" required>
                    </div>
                    <div class="form-group">
                        <label for="regGender">Gender</label>
                        <i class="ri-men-line"></i>
                        <select id="regGender" class="form-control with-icon" required>
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="regDob">Date of Birth</label>
                        <input type="date" id="regDob" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="regAddress">Address</label>
                        <i class="ri-map-pin-line"></i>
                        <input type="text" id="regAddress" class="form-control with-icon" placeholder="Your Address" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <i class="ri-lock-line"></i>
                        <input type="password" id="regPassword" class="form-control with-icon" placeholder="Minimum 8 characters" required minlength="8">
                    </div>
                    <div class="form-group">
                        <label for="regConfirmPassword">Confirm Password</label>
                        <i class="ri-lock-password-line"></i>
                        <input type="password" id="regConfirmPassword" class="form-control with-icon" placeholder="Re-enter password" required>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-group">
                        <input type="checkbox" id="terms" required>
                        <span>I agree to the <a href="404.html" class="forgot-link">Terms & Conditions</a></span>
                    </label>
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Create Account</button>
                
                <div class="register-success" id="regSuccess">
                    <i class="ri-check-line"></i> Account created successfully! Redirecting...
                </div>

                <div class="auth-links" style="text-align: center;">
                    Already have an account? <a href="login.html">Sign In</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/animation.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const pass = document.getElementById('regPassword').value;
            const confirmPass = document.getElementById('regConfirmPassword').value;
            
            if (pass !== confirmPass) {
                alert("Passwords do not match!");
                return;
            }
            
            const btn = this.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="ri-loader-4-line ri-spin"></i> Creating Account...';
            
            setTimeout(() => {
                document.getElementById('regSuccess').style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            }, 1500);
        });
    </script>
</body>
</html>
