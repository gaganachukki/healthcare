<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Stackly Healthcare</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/contact.css">
    <link rel="stylesheet" href="css/login.css">
    <style>
        .register-success {
            display: none;
            background: rgba(0, 240, 255, 0.1);
            color: var(--cyan-glow);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            border: 1px solid var(--cyan-glow);
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Register Container -->
    <div class="auth-container">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        
        <div class="glass-card auth-card reveal" style="max-width: 450px;">
            <img src="assets/logo.webp" alt="Stackly Logo" style="height: 35px; width: auto; object-fit: contain; margin-bottom: 25px; display: block; margin-left: auto; margin-right: auto;">
            <h2 style="font-size: 2.2rem; font-weight: 700; margin-bottom: 30px; color: #fff;">Create Account</h2>
            
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <input type="text" id="regName" class="form-control" placeholder="Full Name" oninput="this.value = this.value.replace(/[^A-Za-z\s]/g, '')" required>
                </div>

                <div class="form-group">
                    <select id="regRole" class="form-control" required style="appearance: none; -webkit-appearance: none; -moz-appearance: none; background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2224%22 height=%2224%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23a0a5b1%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><polyline points=%226 9 12 15 18 9%22></polyline></svg>'); background-repeat: no-repeat; background-position: right 15px center; background-size: 16px; padding-right: 40px; color: #a0a5b1;">
                        <option value="" disabled selected>Select Role</option>
                        <option value="patient" style="background: var(--secondary-dark); color: #fff;">Patient</option>
                        <option value="doctor" style="background: var(--secondary-dark); color: #fff;">Doctor</option>
                        <option value="admin" style="background: var(--secondary-dark); color: #fff;">Admin</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <input type="email" id="regEmail" class="form-control" placeholder="Email Address" required>
                </div>
                
                <div class="form-group">
                    <div class="password-wrapper">
                        <input type="password" id="regPassword" class="form-control" placeholder="Password" required minlength="8">
                        <i class="ri-eye-line toggle-password" onclick="togglePass('regPassword', this)"></i>
                    </div>
                </div>

                <div class="form-group">
                    <div class="password-wrapper">
                        <input type="password" id="regConfirmPassword" class="form-control" placeholder="Confirm Password" required>
                        <i class="ri-eye-line toggle-password" onclick="togglePass('regConfirmPassword', this)"></i>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-group">
                        <input type="checkbox" id="terms" required style="accent-color: #2563eb;">
                        <span style="font-size: 0.95rem; color: #a0a5b1;">I agree to Terms & Privacy</span>
                    </label>
                </div>
                
                <button type="submit" class="btn-login" style="width: 100%; margin-top: 15px; background: #2563eb; box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);">Sign Up</button>
                
                <div class="register-success" id="regSuccess">
                    <i class="ri-check-line"></i> Account created successfully! Redirecting...
                </div>

                <div class="auth-links" style="text-align: center; margin-top: 20px;">
                    Already have an account? <a href="login.html" class="signup-link">Sign In</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/animation.js"></script>
    <script>
        // Style Select color when value changes
        const roleSelect = document.getElementById('regRole');
        roleSelect.addEventListener('change', function() {
            if (this.value) {
                this.style.color = '#fff';
            } else {
                this.style.color = '#a0a5b1';
            }
        });

        // Toggle password helper
        function togglePass(id, icon) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('ri-eye-line');
                icon.classList.add('ri-eye-off-line');
            } else {
                input.type = 'password';
                icon.classList.remove('ri-eye-off-line');
                icon.classList.add('ri-eye-line');
            }
        }

        // Handle Signup logic
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
