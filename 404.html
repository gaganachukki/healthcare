<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Stackly Healthcare</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/404.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
                <img src="assets/logo.webp" alt="Stackly Logo" style="height: 40px; width: auto; object-fit: contain;">
            </a>
        </div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="departments.html">Departments</a>
            <a href="services.html">Services</a>
            <a href="doctors.html">Doctors</a>
            <a href="blog.html">Blog</a>
            <a href="contact.html">Contact</a>
        </nav>
        <a href="login.html" class="btn-outline header-btn">Login <i class="ri-user-line"></i></a>
        <i class="ri-menu-line mobile-toggle"></i>
    </header>

    <!-- Mobile Sidebar -->
    <div class="sidebar">
        <i class="ri-close-line close-sidebar"></i>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="departments.html">Departments</a>
            <a href="services.html">Services</a>
            <a href="doctors.html">Doctors</a>
            <a href="blog.html">Blog</a>
            <a href="contact.html">Contact</a>
        </nav>
        <a href="login.html" class="btn-outline header-btn">Login</a>
    </div>

    <!-- 404 Container -->
    <div class="not-found-container">
        <div class="floating-symbols">
            <i class="ri-heart-pulse-line symbol-1"></i>
            <i class="ri-stethoscope-line symbol-2"></i>
            <i class="ri-capsule-line symbol-3"></i>
            <i class="ri-first-aid-kit-line symbol-4"></i>
        </div>

        <div class="error-code reveal">404</div>
        <h2 class="reveal delay-1">Page Not Found</h2>
        <p class="reveal delay-2">The page you are looking for doesn't exist or has been moved. Please check the URL or return to the homepage.</p>
        
        <div class="not-found-btns reveal delay-3">
            <button onclick="history.back()" class="btn-outline"><i class="ri-arrow-left-line"></i> Go Back</button>
            <a href="index.html" class="btn-primary">Back To Home <i class="ri-home-4-line"></i></a>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/animation.js"></script>
</body>
</html>
